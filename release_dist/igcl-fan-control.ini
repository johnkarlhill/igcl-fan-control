# igcl-fan-control — Default Configuration
#
# Lines starting with # or ; are comments.
# Run 'igcl-fan-control.exe --validate' to check your config.

[global]
# Default profile for GPUs that don't have a specific [gpu.*] entry.
# Must match a [profile.<name>] section below.
default_profile = aggressive

# ---------------------------------------------------------------------------
#  Profiles  —  Define fan behaviors here
# ---------------------------------------------------------------------------

# Aggressive curve: quieter at idle, ramps hard, 100% by 65C
[profile.aggressive]
mode = table
units = percent
points = 30:35, 40:55, 50:75, 60:90, 65:100, 70:100

# Standard curve: gentler ramp, 100% by 75C
[profile.standard]
mode = table
units = percent
points = 30:30, 45:50, 55:70, 65:85, 75:100, 85:100

# Maximum cooling: fixed at 100%
[profile.max_cooling]
mode = fixed
units = percent
speed = 100

# Quiet operation: low noise, only ramps when hot
[profile.quiet]
mode = table
units = percent
points = 30:20, 50:35, 60:50, 70:70, 80:90, 90:100

# Stock hardware defaults (let the GPU manage itself)
[profile.stock]
mode = default

# Maximum cooling using RPM values (for GPUs that prefer RPM)
[profile.max_rpm]
mode = fixed
units = rpm
speed = 6000

# ---------------------------------------------------------------------------
#  GPU Assignments  —  Match GPUs to profiles
# ---------------------------------------------------------------------------
# match = case-insensitive substring of the GPU name (e.g. "B50", "Arc", "Intel")
# profile = which [profile.<name>] to apply (uses global default if omitted)
#
# Examples:
#
# [gpu.primary]
# match = B70
# profile = aggressive
#
# [gpu.secondary]
# match = B50
# profile = max_cooling
#
# [gpu.integrated]
# match = Iris
# profile = quiet
